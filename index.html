<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน R11 M-Flow - Validation Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        
        /* สไตล์ตารางหลัก */
        table { border-collapse: collapse; width: 100%; font-size: 0.75rem; table-layout: auto; border: 1px solid #000; }
        th, td { border: 1px solid #000; padding: 4px 2px; text-align: center; position: relative; transition: all 0.2s; }
        th { background-color: #e5e7eb; font-weight: 600; color: #374151; }
        
        /* สไตล์พิเศษสำหรับหน้าสรุปรายงานสะสม (Cumulative) */
        .cum-table-style { 
            table-layout: auto !important; 
            width: max-content !important; 
            min-width: 100%; 
        }
        
        .cum-table-style td, .cum-table-style th {
            white-space: nowrap;
            padding: 4px 3px; /* ลด padding เพื่อให้ตารางแคบลง */
        }

        /* ปรับขนาดช่องตัวเลขหน้าสะสมให้กระชับขึ้น (ลดจาก 65px เหลือ 58px) */
        .num-input-cum { 
            background-color: #f0f9ff; 
            cursor: default; 
            min-width: 58px !important; 
            font-size: 0.8rem;
        }

        .table-main-title {
            background-color: #d1d5db;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .row-label { background-color: #f9fafb; text-align: left; font-weight: 600; padding-left: 8px; min-width: 140px; }
        
        input { width: 100%; border: none; background: transparent; text-align: center; outline: none; padding: 4px; font-size: 0.85rem; font-weight: 600; position: relative; z-index: 5; }
        input:focus { background-color: #fef3c7; border-radius: 2px; }
        
        .val-hint {
            display: block; font-size: 0.7rem; font-weight: 800; line-height: 1.1; margin-top: 1px; position: relative; z-index: 5; text-shadow: 0px 0px 1px rgba(255,255,255,0.8); min-height: 12px;
        }

        /* Styling for M-Flow Title based on image */
        .mflow-title {
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            display: inline-block;
            letter-spacing: -1px;
            position: relative;
            color: #00338d; /* Dark Blue */
            text-shadow: 1px 1px 0px #fff, 3px 3px 0px rgba(0,0,0,0.1);
        }
        
        .mflow-title::before {
            content: "";
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ee2e24; /* Red accent line */
            border-radius: 2px;
        }

        @keyframes continuous-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
            20%, 40%, 60%, 80% { transform: translateX(2px); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        @keyframes modal-pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        td.status-correct { background-color: #dcfce7 !important; border: 2px solid #16a34a !important; }
        td.status-incorrect { 
            background-color: #fee2e2 !important; 
            border: 2px solid #dc2626 !important; 
            animation: continuous-shake 0.6s ease-in-out infinite, pulse-red 1.5s infinite;
            z-index: 20;
        }
        
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1rem; margin-bottom: 2rem; overflow-x: auto; }
        
        .tab-btn { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; transition: all 0.3s; }
        .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; background-color: white; }

        .btn-clear-table {
            font-size: 0.7rem; background-color: #ef4444; color: white; padding: 4px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }

        .btn-copy-table {
            font-size: 0.7rem; background-color: #4b5563; color: white; padding: 4px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-copy-table:hover { background-color: #1f2937; }

        .modal-overlay {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-card { 
            background: white; padding: 2rem; border-radius: 20px; max-width: 450px; width: 90%; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: modal-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-icon-container {
            width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
        }
        .icon-warning { background: #fff7ed; color: #f97316; border: 4px solid #ffedd5; }
        .icon-danger { background: #fef2f2; color: #ef4444; border: 4px solid #fee2e2; }
        .icon-info { background: #eff6ff; color: #3b82f6; border: 4px solid #dbeafe; }

        .counter-badge { background: #3b82f6; color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }
        
        #toast {
            visibility: hidden; min-width: 250px; background-color: #1f2937; color: #fff; text-align: center; border-radius: 12px;
            padding: 16px; position: fixed; z-index: 2000; left: 50%; transform: translateX(-50%); bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 bg-slate-50">

    <!-- Smart Modal -->

                </svg>

                <button id="main-save-btn" onclick="handleSaveActionWithVerification()" class="bg-emerald-600 text-white px-12 py-5 rounded-2xl shadow-xl hover:bg-emerald-700 hover:shadow-emerald-200 transition-all font-bold text-xl min-w-[320px] active:scale-95 flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>

            <div class="flex gap-4">
                <button onclick="window.print()" class="bg-white text-gray-700 px-8 py-4 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-50 transition font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>

    <script>
        const CHANNELS_GENERAL = ["Counter Service", "Mobile Banking", "บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];
        const CHANNELS_TABLE3 = ["บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];
        const CHANNELS_TABLE4 = ["บัญชีบัตร Easy Pass", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต", "ยังไม่ระบุช่องทาง", "รายการโต้แย้งที่ไม่ได้ระบุช่องทาง"];
        const CHANNELS_TABLE5 = ["บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];

        let currentTab = 'verify';
        let saveCounter = 0;
        let hasValidationErrors = false;
        let savedHistory = []; 

// === วางโค้ดส่วนนี้ (1) ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyF4gpfPD7-Ket7HPKNLjtX6TxPQewKmFwMkd9GZe0xPuM4aKjLqDmu4afawB2Lz4IK/exec"; 

       // วางไว้ประมาณบรรทัดที่ 147 ต่อจาก SCRIPT_URL
function getTableDataArray(tableId) {
    const table = document.getElementById(tableId); 
    if (!table) {
        console.error("หาตารางไม่เจอ ID:", tableId);
        return [];
    }
    // ดึงเฉพาะ input .num-input ของหน้าแรก และไม่เอาแถวรวม (total-row)
    return Array.from(table.querySelectorAll('tbody tr:not(.total-row) .num-input'))
                .map(i => unformatNumber(i.value));
}

        function getSummaryDataArray() {
            const rows = document.querySelectorAll('.summary-body-verify tr:not(.total-row)');
            let data = [];
            rows.forEach(row => {
                const inputs = Array.from(row.querySelectorAll('.num-input'));
                data.push(inputs.map(input => unformatNumber(input.value)));
            });
            return data;
        }
        // ==========================

async function fetchCloudData() {
    try {
        // ดึงข้อมูลจาก Google Script
        const response = await fetch(SCRIPT_URL);
        const cloudData = await response.json();

        // --- ส่วนที่ 1: อัปเดตตารางสรุป (ตารางที่ 1) ---
        const sCumBody = document.querySelector('.summary-body-cum');
        if (sCumBody && cloudData.summary) {
            const rows = sCumBody.querySelectorAll('tr:not(.total-row)');
            cloudData.summary.forEach((rowData, rIdx) => {
                if (rows[rIdx]) {
                    const inputs = rows[rIdx].querySelectorAll('.num-input-cum');
                    rowData.forEach((val, iIdx) => {
                        if (inputs[iIdx]) {
                            // ใส่ค่าลงช่อง และฟอร์แมตตัวเลข (ทศนิยม 2 ตำแหน่งสำหรับเงิน)
                            const isMoney = [2, 3, 4, 5, 6, 7].includes(iIdx);
                            inputs[iIdx].value = formatNumber(val, isMoney ? 2 : 0);
                        }
                    });
                }
            });
        }

        // --- ส่วนที่ 2: อัปเดตตารางย่อย 2-5 (ช่องใครช่องมัน) ---
        const tableIds = ['success', 'failed', 'pending', 'processing'];
        tableIds.forEach(id => {
            const table = document.getElementById(`${id}-table-cum`);
            if (table && cloudData.tables[id]) {
                // ดึงช่อง input ทั้งหมดในตารางนั้นๆ (เรียงลำดับตามที่ส่งมาจาก Script)
                const allInputs = table.querySelectorAll('tbody tr:not(.total-row) .num-input-cum');
                const dataArray = cloudData.tables[id];
                
                allInputs.forEach((input, idx) => {
                    if (dataArray[idx] !== undefined) {
                        // ตรวจสอบว่าเป็นช่องจำนวนเงินหรือไม่ (อิงตาม placeholder .00)
                        const isMoney = input.placeholder.includes('.00');
                        input.value = formatNumber(dataArray[idx], isMoney ? 2 : 0);
                    }
                });
            }
        });

        // สั่งให้หน้าเว็บคำนวณแถว "ยอดรวม" (แถวสีเทาด้านล่างสุด) ใหม่
        calculateCumulativeTotals();
        
        showToast("🔄 อัปเดตยอดสะสมจาก Cloud เรียบร้อยแล้ว");
    } catch (e) {
        console.error("Cloud Fetch Error:", e);
        showToast("⚠️ ดึงข้อมูลสะสมไม่สำเร็จ");
    }
}

function getSummaryDataArray() {
    const rows = document.querySelectorAll('.summary-body-verify tr:not(.total-row)');
    return Array.from(rows).map(row => 
        Array.from(row.querySelectorAll('.num-input')).map(i => unformatNumber(i.value))
    );
}

function getTableDataArray(tableId) {
    // ใช้ tableId ตรงๆ เพราะใน executeSave เราส่ง 'success-table' ไปแล้ว
    const table = document.getElementById(tableId); 
    if (!table) {
        console.error("หาตารางไม่เจอ ID:", tableId);
        return [];
    }
    return Array.from(table.querySelectorAll('tbody tr:not(.total-row) .num-input'))
                .map(i => unformatNumber(i.value));
}
        function formatNumber(n, d = 0) {
            if (n === 0 && d === 0) return "0";
            if (!n && n !== 0) return "";
            return parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
        }

        function unformatNumber(n) { 
            if (typeof n === 'string') return parseFloat(n.replace(/,/g, "")) || 0;
            return parseFloat(n) || 0;
        }

        function copyTableValues(tableId) {
            const table = document.getElementById(tableId);
            const rows = Array.from(table.querySelectorAll('tbody tr'));
            let copyText = "";
            rows.forEach((row, rowIndex) => {
                const inputs = Array.from(row.querySelectorAll('input'));
                const values = inputs.map(input => input.value || "0");
                copyText += values.join("\t") + (rowIndex < rows.length - 1 ? "\n" : "");
            });
            const el = document.createElement('textarea');
            el.value = copyText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("📋 คัดลอกข้อมูลตัวเลขแล้ว");
        }

        function handleSmartPaste(e) {
            if (e.target.tagName !== 'INPUT' || !e.target.classList.contains('num-input')) return;
            const clipboardData = e.clipboardData || window.clipboardData;
            const pastedText = clipboardData.getData('text');
            let values = pastedText.split(/[\t\n\r]/).map(v => v.trim()).filter(v => v !== "");
            if (values.length > 1) {
                e.preventDefault();
                const table = e.target.closest('table');
                const allInputs = Array.from(table.querySelectorAll('.num-input'));
                const startIndex = allInputs.indexOf(e.target);
                if (startIndex === -1) return;
                let valueIdx = 0;
                for (let i = startIndex; i < allInputs.length && valueIdx < values.length; i++) {
                    const input = allInputs[i];
                    const val = unformatNumber(values[valueIdx]);
                    input.value = formatNumber(val, input.placeholder.includes('.00') ? 2 : 0);
                    valueIdx++;
                }
                validateAll();
                showToast(`✅ วางข้อมูลสำเร็จ ${values.length} ช่อง`);
            }
        }

        function openConfirmModal(type, title, desc, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const iconBox = document.getElementById('modal-icon-box');
            const iconPath = document.getElementById('icon-path');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            iconBox.className = "modal-icon-container " + (type === 'danger' ? 'icon-danger' : (type === 'info' ? 'icon-info' : 'icon-warning'));
            confirmBtn.className = "flex-1 px-6 py-3 text-white rounded-xl font-bold shadow-lg transition active:scale-95 " + (type === 'danger' ? 'bg-red-500 hover:bg-red-600' : (type === 'info' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-orange-500 hover:bg-orange-600'));
            if(type === 'danger') {
                iconPath.setAttribute('d', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z');
            } else if (type === 'info') {
                iconPath.setAttribute('d', 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z');
            } else {
                iconPath.setAttribute('d', 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z');
            }
            confirmBtn.onclick = () => { onConfirm(); closeConfirmModal(); };
            modal.classList.add('active');
        }

        function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('active'); }

        function handleClearCurrentPage() {
            if (currentTab === 'verify') {
                openConfirmModal('warning', 'ล้างหน้าตรวจสอบ?', 'คุณกำลังจะล้างข้อมูลที่กรอกไว้ในหน้าตรวจสอบทั้งหมด (ยอดสะสมจะไม่ถูกผลกระทบ)', () => {
                    document.querySelectorAll('#page-verify .num-input').forEach(i => i.value = '');
                    validateAll();
                    showToast("🧹 ล้างหน้าตรวจสอบเรียบร้อย");
                });
            } else {
                openConfirmModal('danger', 'รีเซ็ตยอดสะสมใน Cloud?', 'ระวัง! ข้อมูลสรุปผลสะสมทั้งหมดที่เคยบันทึกไว้ใน Google Sheet จะถูกลบทิ้งถาวร ไม่สามารถกู้คืนได้', async () => {
            try {
                showToast("⏳ กำลังล้างข้อมูลใน Cloud...");
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "clear_all" }) // ส่งคำสั่งล้างข้อมูล
                });
                const result = await response.json();

                if (result.status === "success") {
                    // ล้างตัวเลขในหน้าจอ
                    document.querySelectorAll('#page-cumulative .num-input-cum').forEach(i => i.value = '');
                    saveCounter = 0;
                    savedHistory = []; 
                    document.getElementById('save-count-badge').innerText = "0 รอบ";
                    calculateCumulativeTotals();
                    showToast("💥 ล้างข้อมูลใน Cloud และรีเซ็ตหน้าจอสำเร็จ!");
                }
            } catch (error) {
                console.error("Clear Cloud Error:", error);
                showToast("❌ ล้างข้อมูลไม่สำเร็จ");
            }
        });
    }
}

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`page-${t}`).classList.remove('hidden');
            const saveControls = document.getElementById('verify-controls');
            if(t === 'verify') {
                saveControls.classList.remove('hidden');
                validateAll();
            } else {
                saveControls.classList.add('hidden');
                fetchCloudData(); // <--- เพิ่มบรรทัดนี้เพื่อดึงข้อมูลจาก Cloud เมื่อกดมาหน้า 2
            }
        }

        function clearSpecificTable(tableId) {
            openConfirmModal('warning', 'ล้างข้อมูลตาราง?', 'คุณต้องการล้างข้อมูลในตารางที่เลือกนี้ใช่หรือไม่?', () => {
                const table = document.getElementById(tableId);
                table.querySelectorAll('input.num-input').forEach(input => input.value = '');
                validateAll();
            });
        }

        function validateAll() {
            if (currentTab !== 'verify') return;
            hasValidationErrors = false;
            let total_C1C4_Member_AllTables = 0, total_C1C4_NonMember_AllTables = 0, global_MemberMoney = 0, global_NonMemberMoney = 0;
            ['success', 'failed', 'pending', 'processing'].forEach(id => {
                const table = document.getElementById(`${id}-table`);
                if (!table) return;
                const rows = Array.from(table.querySelectorAll('tbody tr'));
                let colSums = Array(22).fill(0);
                rows.forEach((row, rIdx) => {
                    const isTotalRow = row.classList.contains('total-row');
                    const ins = row.querySelectorAll('.num-input');
                    const v = Array.from(ins).map(i => unformatNumber(i.value));
                    const calcMemberQty = (v[0]+v[1]+v[2]+v[3]) + (v[4]+v[5]+v[6]+v[7]) + (v[8]+v[9]+v[10]+v[11]);
                    const calcMemberMoney = ((v[0]+v[4]+v[8])*30) + ((v[1]+v[5]+v[9])*50) + ((v[2]+v[6]+v[10])*70);
                    const calcNonMemberQty = v[14]+v[15]+v[16]+v[17];
                    const calcNonMemberMoney = (v[14]*30) + (v[15]*50) + (v[16]*70);
                    if (!isTotalRow) {
                        if(updateFieldStatus(ins[12], v[12], calcMemberQty)) hasValidationErrors = true;
                        if(updateFieldStatus(ins[13], v[13], calcMemberMoney, true)) hasValidationErrors = true;
                        if(updateFieldStatus(ins[18], v[18], calcNonMemberQty)) hasValidationErrors = true;
                        if(updateFieldStatus(ins[19], v[19], calcNonMemberMoney, true)) hasValidationErrors = true;
                        if(updateFieldStatus(ins[20], v[20], calcMemberQty + calcNonMemberQty)) hasValidationErrors = true;
                        if(updateFieldStatus(ins[21], v[21], calcMemberMoney + calcNonMemberMoney, true)) hasValidationErrors = true;
                        v.forEach((val, idx) => colSums[idx] += val);
                        total_C1C4_Member_AllTables += calcMemberQty;
                        total_C1C4_NonMember_AllTables += calcNonMemberQty;
                        global_MemberMoney += calcMemberMoney;
                        global_NonMemberMoney += calcNonMemberMoney;
                    } else {
                        v.forEach((val, idx) => { if(updateFieldStatus(ins[idx], val, colSums[idx], [13,19,21].includes(idx))) hasValidationErrors = true; });
                    }
                });
            });
            const sRows = document.querySelectorAll('.summary-body-verify tr');
            if (sRows.length >= 3) {
                const mInps = sRows[0].querySelectorAll('.num-input'), nmInps = sRows[1].querySelectorAll('.num-input'), tInps = sRows[2].querySelectorAll('.num-input');
                const mV = Array.from(mInps).map(i => unformatNumber(i.value)), nmV = Array.from(nmInps).map(i => unformatNumber(i.value));
                if(updateFieldStatus(mInps[0], mV[0], total_C1C4_Member_AllTables)) hasValidationErrors = true;
                if(updateFieldStatus(nmInps[0], nmV[0], total_C1C4_NonMember_AllTables)) hasValidationErrors = true;
                if(updateFieldStatus(mInps[2], mV[2], global_MemberMoney, true)) hasValidationErrors = true;
                if(updateFieldStatus(nmInps[2], nmV[2], global_NonMemberMoney, true)) hasValidationErrors = true;
                if(updateFieldStatus(mInps[7], mV[7], mV[2]+mV[3]+mV[4]+mV[5]+mV[6], true)) hasValidationErrors = true;
                if(updateFieldStatus(nmInps[7], nmV[7], nmV[2]+nmV[3]+nmV[4]+nmV[5]+nmV[6], true)) hasValidationErrors = true;
                for(let i=0; i<8; i++) { if(tInps[i]) if(updateFieldStatus(tInps[i], unformatNumber(tInps[i].value), mV[i] + nmV[i], [2,3,4,5,6,7].includes(i))) hasValidationErrors = true; }
            }
            document.getElementById('error-status-msg').classList.toggle('hidden', !hasValidationErrors);
        }

        function calculateCumulativeTotals() {
            ['success', 'failed', 'pending', 'processing'].forEach(id => {
                const table = document.getElementById(`${id}-table-cum`);
                if (!table) return;
                const rows = Array.from(table.querySelectorAll('tbody tr:not(.total-row)')), totalRowInps = table.querySelectorAll('.total-row .num-input-cum');
                let colSums = Array(22).fill(0);
                rows.forEach(row => {
                    const v = Array.from(row.querySelectorAll('.num-input-cum')).map(i => unformatNumber(i.value));
                    v.forEach((val, idx) => colSums[idx] += val);
                });
                colSums.forEach((sum, idx) => { if (totalRowInps[idx]) totalRowInps[idx].value = formatNumber(sum, [13,19,21].includes(idx) ? 2 : 0); });
            });
            const sInpsRows = document.querySelectorAll('.summary-body-cum tr');
            if (sInpsRows.length >= 3) {
                const mInps = sInpsRows[0].querySelectorAll('.num-input-cum'), nmInps = sInpsRows[1].querySelectorAll('.num-input-cum'), totalInps = sInpsRows[2].querySelectorAll('.num-input-cum');
                for(let i=0; i<8; i++) { if (mInps[i] && nmInps[i] && totalInps[i]) totalInps[i].value = formatNumber(unformatNumber(mInps[i].value) + unformatNumber(nmInps[i].value), [2,3,4,5,6,7].includes(i) ? 2 : 0); }
            }
        }

        function updateFieldStatus(input, curValue, targetValue, isMoney = false) {
            if (!input) return false;
            const td = input.parentElement, hint = td.querySelector('.val-hint');
            if(!hint) return false;
            td.classList.remove('status-correct', 'status-incorrect');
            hint.innerText = "";
            if (input.value.trim() === "") return false;
            hint.innerText = `(${formatNumber(targetValue, isMoney ? 2 : 0)})`;
            const isCorrect = Math.abs(curValue - targetValue) < 0.01;
            if (isCorrect) { td.classList.add('status-correct'); return false; } 
            else { td.classList.add('status-incorrect'); return true; }
        }

        function handleSaveActionWithVerification() {
            const allInputs = Array.from(document.querySelectorAll('#page-verify .num-input'));
            const filledInputs = allInputs.filter(i => i.value.trim() !== "");
            if (filledInputs.length === 0) {
                openConfirmModal('danger', 'ไม่พบข้อมูล!', 'กรุณากรอกข้อมูลก่อนกดบันทึกยอดสะสม', () => {});
                return;
            }
            if (hasValidationErrors) {
                openConfirmModal('danger', 'ข้อมูลไม่ถูกต้อง!', 'โปรดแก้ไขข้อมูลในช่องสีแดงให้ถูกต้องตามตัวเลขในวงเล็บก่อนบันทึก', () => {});
                return;
            }
            const currentFingerprint = allInputs.map(i => i.value.trim()).join('|');
            const duplicateIndex = savedHistory.indexOf(currentFingerprint);
            if (duplicateIndex !== -1) {
                openConfirmModal('warning', 'ตรวจพบชุดข้อมูลซ้ำ!', `ชุดข้อมูลที่คุณกำลังจะบันทึก เหมือนกับข้อมูลรอบที่ ${duplicateIndex + 1} ทุกช่อง คุณยังต้องการบันทึกเพิ่มเข้าไปอีกใช่หรือไม่?`, () => {
                    executeSave(currentFingerprint);
                });
                return;
            }
            openConfirmModal('info', 'ยืนยันการบันทึก?', 'คุณต้องการบันทึกชุดข้อมูลนี้และนำไปบวกเพิ่มในยอดสะสมใช่หรือไม่?', () => {
                executeSave(currentFingerprint);
            });
        }

async function executeSave(fingerprint) {
            // 1. เตรียมข้อมูลให้ตรงกับ Google Sheet (Timestamp จะถูกเติมที่ฝั่ง Script)
            const dataToSave = {
                staff_name: "พนักงาน_R11", // ตรงนี้สามารถเปลี่ยนเป็นชื่อคนคีย์ได้
                payload: {
                    summary: getSummaryDataArray(),
                    tables: {
                        success: getTableDataArray('success-table'),
                        failed: getTableDataArray('failed-table'),
                        pending: getTableDataArray('pending-table'),
                        processing: getTableDataArray('processing-table')
                    }
                }
            };

            try {
                showToast("⏳ กำลังบันทึกไปยัง Cloud...");
                
                // 2. ส่งข้อมูลไปยัง SCRIPT_URL
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(dataToSave) 
                });

                // 3. เมื่อบันทึกสำเร็จ ให้ล้างข้อมูลหน้าแรกเพื่อรอคีย์รอบใหม่
                saveCounter++;
                savedHistory.push(fingerprint);
                document.getElementById('save-count-badge').innerText = `${saveCounter} รอบ`;
                
                document.querySelectorAll('#page-verify .num-input').forEach(i => i.value = '');
                validateAll();
                
                // 4. ดึงยอดรวมล่าสุดจาก Cloud (ที่รวมของทุกคนแล้ว) มาโชว์ในหน้าสะสมทันที
                await fetchCloudData(); 
                
                showToast(`✅ บันทึกรอบที่ ${saveCounter} และรวมยอดสำเร็จ!`);
            } catch (error) {
                console.error("Cloud Error:", error);
                showToast("❌ บันทึกล้มเหลว: โปรดตรวจสอบการเชื่อมต่อ");
            }
        }
        function showToast(m) {
            const t = document.getElementById("toast"); t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        document.body.addEventListener('input', e => { if(e.target.classList.contains('num-input')) validateAll(); });
        document.body.addEventListener('focusout', e => {
            if(e.target.tagName === 'INPUT') {
                const v = unformatNumber(e.target.value);
                if(e.target.value.trim() !== "") e.target.value = formatNumber(v, e.target.placeholder.includes('.00') ? 2 : 0);
            }
        });
        document.body.addEventListener('paste', handleSmartPaste);

        window.onload = () => {
            createSummaryTable('summary-section-verify', false);
            createSummaryTable('summary-section-cum', true);
            const cfgs = [
                { title: "ตารางที่ 2: ชำระสำเร็จ", id: "success", chs: CHANNELS_GENERAL },
                { title: "ตารางที่ 3: ชำระไม่สำเร็จ", id: "failed", chs: CHANNELS_TABLE3 },
                { title: "ตารางที่ 4: รอดำเนินการชำระ (รายการ)", id: "pending", chs: CHANNELS_TABLE4 },
                { title: "ตารางที่ 5: ระหว่างดำเนินการชำระ", id: "processing", chs: CHANNELS_TABLE5 }
            ];
            cfgs.forEach(c => {
                createTable(c.title, c.id, c.chs, 'dynamic-tables-verify', false);
                createTable(c.title, c.id, c.chs, 'dynamic-tables-cum', true);
            });
            setTimeout(() => { validateAll(); calculateCumulativeTotals(); }, 100);
        };
    </script>
