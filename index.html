<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน R11 M-Flow - Validation Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        
        /* สไตล์ตารางหลัก */
        table { border-collapse: collapse; width: 100%; font-size: 0.75rem; table-layout: auto; border: 1px solid #000; }
        th, td { border: 1px solid #000; padding: 4px 2px; text-align: center; position: relative; transition: all 0.2s; }
        th { background-color: #e5e7eb; font-weight: 600; color: #374151; }
        
        /* สไตล์พิเศษสำหรับหน้าสรุปรายงานสะสม (Cumulative) */
        .cum-table-style { 
            table-layout: auto !important; 
            width: max-content !important; 
            min-width: 100%; 
        }
        
        .cum-table-style td, .cum-table-style th {
            white-space: nowrap;
            padding: 4px 3px;
        }

        .num-input-cum { 
            background-color: #f0f9ff; 
            cursor: default; 
            min-width: 58px !important; 
            font-size: 0.8rem;
        }

        .table-main-title {
            background-color: #d1d5db;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .row-label { background-color: #f9fafb; text-align: left; font-weight: 600; padding-left: 8px; min-width: 140px; }
        
        input { width: 100%; border: none; background: transparent; text-align: center; outline: none; padding: 4px; font-size: 0.85rem; font-weight: 600; position: relative; z-index: 5; }
        input:focus { background-color: #fef3c7; border-radius: 2px; }
        
        .val-hint {
            display: block; font-size: 0.7rem; font-weight: 800; line-height: 1.1; margin-top: 1px; position: relative; z-index: 5; text-shadow: 0px 0px 1px rgba(255,255,255,0.8); min-height: 12px;
        }

        .mflow-title {
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            display: inline-block;
            letter-spacing: -1px;
            position: relative;
            color: #00338d;
            text-shadow: 1px 1px 0px #fff, 3px 3px 0px rgba(0,0,0,0.1);
        }
        
        .mflow-title::before {
            content: "";
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ee2e24;
            border-radius: 2px;
        }

        @keyframes continuous-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
            20%, 40%, 60%, 80% { transform: translateX(2px); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        @keyframes modal-pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        td.status-correct { background-color: #dcfce7 !important; border: 2px solid #16a34a !important; }
        td.status-incorrect { 
            background-color: #fee2e2 !important; 
            border: 2px solid #dc2626 !important; 
            animation: continuous-shake 0.6s ease-in-out infinite, pulse-red 1.5s infinite;
            z-index: 20;
        }
        
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1rem; margin-bottom: 2rem; overflow-x: auto; }
        
        .tab-btn { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; transition: all 0.3s; }
        .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; background-color: white; }

        .btn-clear-table { font-size: 0.7rem; background-color: #ef4444; color: white; padding: 4px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-copy-table { font-size: 0.7rem; background-color: #4b5563; color: white; padding: 4px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; padding: 2rem; border-radius: 20px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: modal-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .counter-badge { background: #3b82f6; color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }
        #sync-timer-badge { font-family: monospace; transition: all 0.3s ease; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #1f2937; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 2000; left: 50%; transform: translateX(-50%); bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media print { .no-print { display: none !important; } }
    </style>
</head>

<body class="p-4 bg-slate-50">

    <div id="login-screen" class="fixed inset-0 z-[5000] bg-slate-100 flex items-center justify-center">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
        <h1 class="text-4xl font-black text-blue-900 mb-6">M-Flow R11</h1>
        <div class="mb-8 text-left">
            <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">เลือกชื่อผู้ตรวจสอบ:</label>
            <select id="user-session" class="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:border-blue-500 outline-none text-lg font-semibold">
                <option value="" disabled selected>-- เลือกรายชื่อ --</option>

        </button>
    </div>
</div>
    <div id="toast">บันทึกสำเร็จ!</div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-card">
            <div id="modal-icon-box" class="modal-icon-container">
                <svg id="icon-svg" xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path id="icon-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 id="modal-title" class="text-2xl font-bold mb-2 text-gray-800">ยืนยัน?</h3>
            <p id="modal-desc" class="text-gray-500 mb-8 leading-relaxed"></p>
            <div class="flex gap-3">
                <button id="modal-cancel-btn" onclick="closeConfirmModal()" class="flex-1 px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition active:scale-95">ยกเลิก</button>
                <button id="modal-confirm-btn" class="flex-1 px-6 py-3 text-white rounded-xl font-bold shadow-lg transition active:scale-95">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div class="max-w-full mx-auto">
        <div class="flex justify-between items-center mb-6 no-print">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight flex items-center gap-3">
                    <span>รายงาน R11</span>
                    <span class="mflow-title">M-Flow</span>
                </h1>
                <p class="text-sm text-gray-500">ระบบตรวจสอบและบันทึกสถิติการชำระเงินดิจิทัล</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-[0.65rem] text-gray-400 uppercase font-bold tracking-widest">สะสมแล้ว</div>
                    <div id="save-count-badge" class="counter-badge">0 รอบ</div>
                </div>
                <div class="text-right ml-4 border-l pl-4 border-gray-200">
                    <div class="text-[0.65rem] text-gray-400 uppercase font-bold tracking-widest">Cloud Sync</div>
                    <div id="sync-timer-badge" class="bg-white text-blue-600 px-3 py-1 rounded-full font-black text-sm border border-blue-100 shadow-sm">20s</div>
                </div>
                <div class="h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-6 no-print bg-white rounded-2xl shadow-sm p-1 border border-gray-100">
            <div id="tab-verify" class="tab-btn flex-1 text-center rounded-xl active" onclick="switchTab('verify')">1. ตรวจสอบรายงานประจำวัน</div>
            <div id="tab-cumulative" class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('cumulative')">2. สรุปรายงานสะสม (Cumulative)</div>
        </div>

        <div id="page-verify" class="tab-content">
            <div id="summary-section-verify"></div>
            <div id="dynamic-tables-verify"></div>
        </div>

        <div id="page-cumulative" class="tab-content hidden">
            <div id="summary-section-cum"></div>
            <div id="dynamic-tables-cum"></div>
        </div>

        <div id="controls-section" class="flex flex-col items-center gap-6 mt-10 mb-24 no-print">
            <div id="verify-controls" class="flex flex-col items-center gap-4 w-full">
                <div id="error-status-msg" class="bg-red-50 text-red-600 px-6 py-3 rounded-2xl font-bold border-2 border-red-200 flex items-center gap-3 hidden">
                    <span class="animate-ping inline-flex h-3 w-3 rounded-full bg-red-400 opacity-75"></span>
                    พบข้อมูลผิดพลาด! โปรดแก้ไขช่องสีแดงให้ถูกต้อง
                </div>
                
                <button id="main-save-btn" onclick="handleSaveActionWithVerification()" class="bg-emerald-600 text-white px-12 py-5 rounded-2xl shadow-xl hover:bg-emerald-700 hover:shadow-emerald-200 transition-all font-bold text-xl min-w-[320px] active:scale-95 flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    บันทึกยอดสะสม
                </button>
            </div>

            <div class="flex gap-4">
                <button onclick="window.print()" class="bg-white text-gray-700 px-8 py-4 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-50 transition font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                    พิมพ์รายงาน
                </button>
                <button id="btn-clear-page" onclick="handleClearCurrentPage()" class="bg-orange-500 text-white px-8 py-4 rounded-xl shadow-lg shadow-orange-100 hover:bg-orange-600 transition font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    <span>ล้างข้อมูลหน้าปัจจุบัน</span>
                </button>
            </div>
        </div>
    </div>

<script>
    // --- 1. GLOBAL VARIABLES & CONFIG ---
    let currentUser = ""; 
    let currentTab = 'verify';
    let saveCounter = 0;
    let hasValidationErrors = false;
    let savedHistory = []; 
    let syncTimeLeft = 20;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyF4gpfPD7-Ket7HPKNLjtX6TxPQewKmFwMkd9GZe0xPuM4aKjLqDmu4afawB2Lz4IK/exec"; 
    const CHANNELS_GENERAL = ["Counter Service", "Mobile Banking", "บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];
    const CHANNELS_TABLE3 = ["บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];
    const CHANNELS_TABLE4 = ["บัญชีบัตร Easy Pass", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต", "ยังไม่ระบุช่องทาง", "รายการโต้แย้งที่ไม่ได้ระบุช่องทาง"];
    const CHANNELS_TABLE5 = ["บัญชีบัตร Easy Pass", "บัญชีบัตร M-PASS", "บัญชีออมทรัพย์", "บัตรเครดิต/เดบิต"];

    // --- 2. SESSION & LOGIN ---
    function startSession() {
        const select = document.getElementById('user-session');
        const loginScreen = document.getElementById('login-screen');
        if (!select.value) {
            alert("กรุณาเลือกชื่อผู้ตรวจสอบก่อนเข้าสู่ระบบครับ");
            return;
        }
        currentUser = select.value;
        loginScreen.style.display = 'none'; 
        showToast(`ยินดีต้อนรับคุณ ${currentUser}`);
    }

    // --- 3. CLOUD SYNC & DATA FETCH ---
    async function fetchCloudData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const cloudData = await response.json();
            if (!cloudData || !cloudData.summary || cloudData.summary.length === 0) {
                document.querySelectorAll('#page-cumulative .num-input-cum').forEach(input => {
                    const isMoney = input.placeholder.includes('.00');
                    input.value = formatNumber(0, isMoney ? 2 : 0);
                });
                document.getElementById('save-count-badge').innerText = "0 รอบ";
                return;
            }
            // อัปเดตตารางสรุป
            const sCumBody = document.querySelector('.summary-body-cum');
            if (sCumBody && cloudData.summary) {
                const rows = sCumBody.querySelectorAll('tr:not(.total-row)');
                cloudData.summary.forEach((rowData, rIdx) => {
                    if (rows[rIdx]) {
                        const inputs = rows[rIdx].querySelectorAll('.num-input-cum');
                        rowData.forEach((val, iIdx) => {
                            if (inputs[iIdx]) {
                                const isMoney = [2, 3, 4, 5, 6, 7].includes(iIdx);
                                inputs[iIdx].value = formatNumber(val, isMoney ? 2 : 0);
                            }
                        });
                    }
                });
            }
            // อัปเดตตารางย่อย 2-5
            const tableIds = ['success', 'failed', 'pending', 'processing'];
            tableIds.forEach(id => {
                const table = document.getElementById(`${id}-table-cum`);
                if (table && cloudData.tables[id]) {
                    const allInputs = table.querySelectorAll('tbody tr:not(.total-row) .num-input-cum');
                    const dataArray = cloudData.tables[id];
                    allInputs.forEach((input, idx) => {
                        if (dataArray[idx] !== undefined) {
                            const isMoney = input.placeholder.includes('.00');
                            input.value = formatNumber(dataArray[idx], isMoney ? 2 : 0);
                        }
                    });
                }
            });
            calculateCumulativeTotals();
        } catch (e) { console.error("Cloud Fetch Error:", e); }
    }

    // --- 4. CORE SAVE LOGIC ---
    async function executeSave(fingerprint) {
        const dataToSave = {
            staff_name: currentUser,
            fingerprint: fingerprint,
            payload: { 
                summary: getSummaryDataArray(), 
                tables: { 
                    success: getTableDataArray('success-table'), 
                    failed: getTableDataArray('failed-table'), 
                    pending: getTableDataArray('pending-table'), 
                    processing: getTableDataArray('processing-table') 
                } 
            } 
        };

        try {
            showToast("⏳ กำลังบันทึกไปยัง Cloud...");
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(dataToSave) });
            const result = await response.json();

            if (result.status === "duplicate") {
                openConfirmModal('danger', 'พบข้อมูลซ้ำ!', 
                    `ชุดข้อมูลนี้ถูกบันทึกไปแล้วโดยคุณ ${result.by_user} เมื่อเวลา ${result.at_time}`, 
                    () => {}
                );
                return;
            }

            if (result.status === "success") {
                saveCounter++; 
                savedHistory.push(fingerprint);
                document.getElementById('save-count-badge').innerText = `${saveCounter} รอบ`;
                document.querySelectorAll('#page-verify .num-input').forEach(i => i.value = '');
                validateAll(); 
                await fetchCloudData(); 
                showToast(`✅ บันทึกรอบที่ ${saveCounter} สำเร็จ!`);
            }
        } catch (error) { showToast("❌ การเชื่อมต่อ Cloud ล้มเหลว"); }
    }

    function handleSaveActionWithVerification() {
        const allI = Array.from(document.querySelectorAll('#page-verify .num-input'));
        if (allI.filter(i => i.value.trim() !== "").length === 0) { 
            openConfirmModal('danger', 'ไม่พบข้อมูล!', 'กรุณากรอกข้อมูลก่อนบันทึก', () => {}); 
            return; 
        }
        if (hasValidationErrors) { 
            openConfirmModal('danger', 'ข้อมูลไม่ถูกต้อง!', 'โปรดแก้ไขช่องสีแดงก่อนบันทึก', () => {}); 
            return; 
        }
        const fingerprint = allI.map(i => i.value.trim()).join('|');
        if (savedHistory.indexOf(fingerprint) !== -1) { 
            openConfirmModal('warning', 'ชุดข้อมูลซ้ำ!', 'ข้อมูลนี้เหมือนกับรอบที่เคยบันทึกไว้ ยืนยันบันทึกซ้ำหรือไม่?', () => executeSave(fingerprint)); 
            return; 
        }
        openConfirmModal('info', 'ยืนยันบันทึก?', 'คุณต้องการบันทึกข้อมูลและบวกเพิ่มยอดสะสมใช่หรือไม่?', () => executeSave(fingerprint));
    }

    // --- 5. HELPERS & UTILITIES ---
    function getSummaryDataArray() {
        const rows = document.querySelectorAll('.summary-body-verify tr:not(.total-row)');
        return Array.from(rows).map(row => 
            Array.from(row.querySelectorAll('.num-input')).map(i => unformatNumber(i.value))
        );
    }

    function getTableDataArray(tableId) {
        const table = document.getElementById(tableId); 
        if (!table) return [];
        return Array.from(table.querySelectorAll('tbody tr:not(.total-row) .num-input')).map(i => unformatNumber(i.value));
    }

    function formatNumber(n, d = 0) {
        if (n === 0 && d === 0) return "0";
        if (!n && n !== 0) return "";
        return parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function unformatNumber(n) { 
        if (typeof n === 'string') return parseFloat(n.replace(/,/g, "")) || 0;
        return parseFloat(n) || 0;
    }

    function copyTableValues(tableId) {
        const table = document.getElementById(tableId);
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        let copyText = "";
        rows.forEach((row, rowIndex) => {
            const inputs = Array.from(row.querySelectorAll('input'));
            const values = inputs.map(input => input.value || "0");
            copyText += values.join("\t") + (rowIndex < rows.length - 1 ? "\n" : "");
        });
        const el = document.createElement('textarea');
        el.value = copyText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("📋 คัดลอกข้อมูลตัวเลขแล้ว");
    }

    function handleSmartPaste(e) {
        if (e.target.tagName !== 'INPUT' || !e.target.classList.contains('num-input')) return;
        const pastedText = (e.clipboardData || window.clipboardData).getData('text');
        let values = pastedText.split(/[\t\n\r]/).map(v => v.trim()).filter(v => v !== "");
        if (values.length > 1) {
            e.preventDefault();
            const allInputs = Array.from(e.target.closest('table').querySelectorAll('.num-input'));
            const startIndex = allInputs.indexOf(e.target);
            let valueIdx = 0;
            for (let i = startIndex; i < allInputs.length && valueIdx < values.length; i++) {
                const input = allInputs[i];
                input.value = formatNumber(unformatNumber(values[valueIdx]), input.placeholder.includes('.00') ? 2 : 0);
                valueIdx++;
            }
            validateAll();
            showToast(`✅ วางข้อมูลสำเร็จ ${values.length} ช่อง`);
        }
    }

    function openConfirmModal(type, title, desc, onConfirm) {
        const modal = document.getElementById('confirm-modal');
        const iconBox = document.getElementById('modal-icon-box');
        const iconPath = document.getElementById('icon-path');
        const confirmBtn = document.getElementById('modal-confirm-btn');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        iconBox.className = "modal-icon-container " + (type === 'danger' ? 'icon-danger' : (type === 'info' ? 'icon-info' : 'icon-warning'));
        confirmBtn.className = "flex-1 px-6 py-3 text-white rounded-xl font-bold shadow-lg transition active:scale-95 " + (type === 'danger' ? 'bg-red-500 hover:bg-red-600' : (type === 'info' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-orange-500 hover:bg-orange-600'));
        if(type === 'danger') iconPath.setAttribute('d', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z');
        else if (type === 'info') iconPath.setAttribute('d', 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z');
        else iconPath.setAttribute('d', 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z');
        confirmBtn.onclick = () => { onConfirm(); closeConfirmModal(); };
        modal.classList.add('active');
    }

    function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('active'); }

    function handleClearCurrentPage() {
        if (currentTab === 'verify') {
            openConfirmModal('warning', 'ล้างหน้าตรวจสอบ?', 'คุณกำลังจะล้างข้อมูลที่กรอกไว้ในหน้าตรวจสอบทั้งหมด', () => {
                document.querySelectorAll('#page-verify .num-input').forEach(i => i.value = '');
                validateAll();
                showToast("🧹 ล้างหน้าตรวจสอบเรียบร้อย");
            });
        } else {
            openConfirmModal('danger', 'รีเซ็ตยอดสะสมใน Cloud?', 'ระวัง! ข้อมูลสรุปผลสะสมทั้งหมดใน Cloud จะถูกลบทิ้งถาวร', async () => {
                try {
                    showToast("⏳ กำลังล้างข้อมูลใน Cloud...");
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "clear_all" }) });
                    const result = await response.json();
                    if (result.status === "success") {
                        document.querySelectorAll('#page-cumulative .num-input-cum').forEach(i => i.value = '');
                        saveCounter = 0; savedHistory = []; 
                        document.getElementById('save-count-badge').innerText = "0 รอบ";
                        calculateCumulativeTotals();
                        showToast("💥 ล้างข้อมูลสำเร็จ!");
                    }
                } catch (error) { showToast("❌ ล้างข้อมูลไม่สำเร็จ"); }
            });
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(`tab-${t}`).classList.add('active');
        document.getElementById(`page-${t}`).classList.remove('hidden');
        const saveControls = document.getElementById('verify-controls');
        if(t === 'verify') { saveControls.classList.remove('hidden'); validateAll(); }
        else { saveControls.classList.add('hidden'); fetchCloudData(); }
    }

    // --- 6. TABLE GENERATION ---
    function createSummaryTable(containerId, isCum = false) {
        const container = document.getElementById(containerId);
        const tid = `summary-table${isCum ? '-cum' : ''}`;
        const inputClass = isCum ? 'num-input-cum' : 'num-input';
        const div = document.createElement('div');
        div.className = 'table-container';
        div.innerHTML = `
            <table id="${tid}" class="${isCum ? 'cum-table-style' : ''}">
                <thead>
                    <tr><th colspan="8">
                        <div class="table-main-title">
                            <span>ตารางที่ 1: สรุปภาพรวมรายรายการ ${isCum ? '(ยอดสะสม)' : ''}</span>
                            ${!isCum ? `<button class="btn-clear-table no-print ml-4" onclick="clearSpecificTable('${tid}')">ล้างตารางนี้</button>` : `<button class="btn-copy-table no-print ml-4" onclick="copyTableValues('${tid}')">คัดลอกเฉพาะตัวเลข</button>`}
                        </div>
                    </th></tr>
                    <tr><th style="width: 150px;">รายการ</th><th>จำนวนรายการ</th><th>จำนวนใบแจ้งหนี้</th><th>ค่าผ่านทาง</th><th>ค่าเสียหาย 2 เท่า</th><th>ค่าปรับ 10 เท่า</th><th>ค่าปรับ 200 บาท</th><th>ยอดเงินใบแจ้ง</th></tr>
                </thead>
                <tbody class="${isCum ? 'summary-body-cum' : 'summary-body-verify'}">
                    ${['สมาชิก', 'ไม่ใช่สมาชิก'].map(label => `<tr><td class="row-label">${label}</td>${Array(7).fill(0).map((_, i) => `<td><input type="text" class="${inputClass}" placeholder="${[2,3,4,5,6].includes(i)?'0.00':'0'}">${!isCum ? '<span class="val-hint"></span>' : ''}</td>`).join('')}</tr>`).join('')}
                    <tr class="total-row"><td class="row-label">รวม</td>${Array(7).fill(0).map((_, i) => `<td><input type="text" class="${inputClass}" placeholder="${[2,3,4,5,6].includes(i)?'0.00':'0'}">${!isCum ? '<span class="val-hint"></span>' : ''}</td>`).join('')}</tr>
                </tbody>
            </table>
        `;
        container.appendChild(div);
    }

    function createTable(title, id, chs, cont, isCum = false) {
        const div = document.createElement('div');
        div.className = 'table-container dynamic-table-root';
        const tid = `${id}-table${isCum ? '-cum' : ''}`;
        div.innerHTML = `
            <table id="${tid}" class="${isCum ? 'cum-table-style' : ''}">
                <thead>
                    <tr><th colspan="23"><div class="table-main-title"><span>${title}${isCum ? ' (ยอดสะสม)' : ''}</span>${!isCum ? `<button class="btn-clear-table no-print ml-4" onclick="clearSpecificTable('${tid}')">ล้างตารางนี้</button>` : `<button class="btn-copy-table no-print ml-4" onclick="copyTableValues('${tid}')">คัดลอกเฉพาะตัวเลข</button>`}</div></th></tr>
                    <tr class="bg-gray-100"><th rowspan="3" style="width:140px">ช่องทางการชำระ</th><th colspan="14">สมาชิก</th><th colspan="6">ไม่ใช่สมาชิก</th><th rowspan="3">จำนวนรายการทั้งหมด</th><th rowspan="3">ยอดเงินรวมทั้งหมด (บาท)</th></tr>
                    <tr><th colspan="4">บุคคลไทย</th><th colspan="4">ต่างชาติ</th><th colspan="4">นิติบุคคล</th><th rowspan="2">รวมรายการสมาชิก</th><th rowspan="2">รวมเงินสมาชิก</th><th colspan="4">ไม่ใช่สมาชิก</th><th rowspan="2">รวมรายการไม่ใช่สมาชิก</th><th rowspan="2">รวมเงินไม่ใช่สมาชิก</th></tr>
                    <tr>${Array(4).fill('<th>C1</th><th>C2</th><th>C3</th><th>C4</th>').join('')}</tr>
                </thead>
                <tbody>
                    ${chs.map(ch => `<tr><td class="row-label">${ch}</td>${Array(22).fill(0).map((_, i) => `<td><input type="text" class="${isCum ? 'num-input-cum' : 'num-input'}" placeholder="${[13,19,21].includes(i)?'0.00':'0'}">${!isCum ? '<span class="val-hint"></span>' : ''}</td>`).join('')}</tr>`).join('')}
                    <tr class="total-row"><td class="row-label">ยอดรวม</td>${Array(22).fill(0).map((_, i) => `<td><input type="text" class="${isCum ? 'num-input-cum' : 'num-input'}" placeholder="${[13,19,21].includes(i)?'0.00':'0'}">${!isCum ? '<span class="val-hint"></span>' : ''}</td>`).join('')}</tr>
                </tbody>
            </table>
        `;
        document.getElementById(cont).appendChild(div);
    }

    function clearSpecificTable(tableId) {
        openConfirmModal('warning', 'ล้างข้อมูลตาราง?', 'คุณต้องการล้างข้อมูลในตารางที่เลือกนี้ใช่หรือไม่?', () => {
            document.getElementById(tableId).querySelectorAll('input.num-input').forEach(input => input.value = '');
            validateAll();
        });
    }

    // --- 7. CALCULATION & VALIDATION ---
    function validateAll() {
        if (currentTab !== 'verify') return;
        hasValidationErrors = false;
        let mQty = 0, nmQty = 0, mMoney = 0, nmMoney = 0;
        ['success', 'failed', 'pending', 'processing'].forEach(id => {
            const table = document.getElementById(`${id}-table`);
            if (!table) return;
            let colSums = Array(22).fill(0);
            table.querySelectorAll('tbody tr').forEach(row => {
                const ins = row.querySelectorAll('.num-input'), v = Array.from(ins).map(i => unformatNumber(i.value));
                const calcMQ = (v[0]+v[1]+v[2]+v[3])+(v[4]+v[5]+v[6]+v[7])+(v[8]+v[9]+v[10]+v[11]);
                const calcMM = ((v[0]+v[4]+v[8])*30)+((v[1]+v[5]+v[9])*50)+((v[2]+v[6]+v[10])*70);
                const calcNMQ = v[14]+v[15]+v[16]+v[17];
                const calcNMM = (v[14]*30)+(v[15]*50)+(v[16]*70);
                if (!row.classList.contains('total-row')) {
                    if(updateFieldStatus(ins[12], v[12], calcMQ)) hasValidationErrors = true;
                    if(updateFieldStatus(ins[13], v[13], calcMM, true)) hasValidationErrors = true;
                    if(updateFieldStatus(ins[18], v[18], calcNMQ)) hasValidationErrors = true;
                    if(updateFieldStatus(ins[19], v[19], calcNMM, true)) hasValidationErrors = true;
                    if(updateFieldStatus(ins[20], v[20], calcMQ+calcNMQ)) hasValidationErrors = true;
                    if(updateFieldStatus(ins[21], v[21], calcMM+calcNMM, true)) hasValidationErrors = true;
                    v.forEach((val, idx) => colSums[idx] += val);
                    mQty += calcMQ; nmQty += calcNMQ; mMoney += calcMM; nmMoney += calcNMM;
                } else {
                    v.forEach((val, idx) => { if(updateFieldStatus(ins[idx], val, colSums[idx], [13,19,21].includes(idx))) hasValidationErrors = true; });
                }
            });
        });
        const sRows = document.querySelectorAll('.summary-body-verify tr');
        if (sRows.length >= 3) {
            const mI = sRows[0].querySelectorAll('.num-input'), nmI = sRows[1].querySelectorAll('.num-input'), tI = sRows[2].querySelectorAll('.num-input');
            const mV = Array.from(mI).map(i => unformatNumber(i.value)), nmV = Array.from(nmI).map(i => unformatNumber(i.value));
            if(updateFieldStatus(mI[0], mV[0], mQty)) hasValidationErrors = true;
            if(updateFieldStatus(nmI[0], nmV[0], nmQty)) hasValidationErrors = true;
            if(updateFieldStatus(mI[2], mV[2], mMoney, true)) hasValidationErrors = true;
            if(updateFieldStatus(nmI[2], nmV[2], nmMoney, true)) hasValidationErrors = true;
            if(updateFieldStatus(mI[7], mV[7], mV[2]+mV[3]+mV[4]+mV[5]+mV[6], true)) hasValidationErrors = true;
            if(updateFieldStatus(nmI[7], nmV[7], nmV[2]+nmV[3]+nmV[4]+nmV[5]+nmV[6], true)) hasValidationErrors = true;
            for(let i=0; i<8; i++) if(tI[i]) if(updateFieldStatus(tI[i], unformatNumber(tI[i].value), mV[i]+nmV[i], [2,3,4,5,6,7].includes(i))) hasValidationErrors = true;
        }
        document.getElementById('error-status-msg').classList.toggle('hidden', !hasValidationErrors);
    }

    function calculateCumulativeTotals() {
        ['success', 'failed', 'pending', 'processing'].forEach(id => {
            const table = document.getElementById(`${id}-table-cum`);
            if (!table) return;
            const rows = table.querySelectorAll('tbody tr:not(.total-row)'), tRowI = table.querySelectorAll('.total-row .num-input-cum');
            let colSums = Array(22).fill(0);
            rows.forEach(row => Array.from(row.querySelectorAll('.num-input-cum')).forEach((i, idx) => colSums[idx] += unformatNumber(i.value)));
            colSums.forEach((sum, idx) => { if (tRowI[idx]) tRowI[idx].value = formatNumber(sum, [13,19,21].includes(idx) ? 2 : 0); });
        });
        const sRows = document.querySelectorAll('.summary-body-cum tr');
        if (sRows.length >= 3) {
            const mI = sRows[0].querySelectorAll('.num-input-cum'), nmI = sRows[1].querySelectorAll('.num-input-cum'), tI = sRows[2].querySelectorAll('.num-input-cum');
            for(let i=0; i<8; i++) if (mI[i] && nmI[i] && tI[i]) tI[i].value = formatNumber(unformatNumber(mI[i].value) + unformatNumber(nmI[i].value), [2,3,4,5,6,7].includes(i) ? 2 : 0);
        }
    }

    function updateFieldStatus(input, curValue, targetValue, isMoney = false) {
        if (!input) return false;
        const td = input.parentElement, hint = td.querySelector('.val-hint');
        if(!hint) return false;
        td.classList.remove('status-correct', 'status-incorrect'); hint.innerText = "";
        if (input.value.trim() === "") return false;
        hint.innerText = `(${formatNumber(targetValue, isMoney ? 2 : 0)})`;
        if (Math.abs(curValue - targetValue) < 0.01) { td.classList.add('status-correct'); return false; } 
        else { td.classList.add('status-incorrect'); return true; }
    }

    function showToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }

    // --- 8. EVENTS & INITIALIZATION ---
    document.body.addEventListener('input', e => { if(e.target.classList.contains('num-input')) validateAll(); });
    document.body.addEventListener('focusout', e => { 
        if(e.target.tagName === 'INPUT') { 
            const v = unformatNumber(e.target.value); 
            if(e.target.value.trim() !== "") e.target.value = formatNumber(v, e.target.placeholder.includes('.00') ? 2 : 0); 
        } 
    });
    document.body.addEventListener('paste', handleSmartPaste);

    window.onload = () => {
        createSummaryTable('summary-section-verify', false);
        createSummaryTable('summary-section-cum', true);
        const cfgs = [
            { title: "ตารางที่ 2: ชำระสำเร็จ", id: "success", chs: CHANNELS_GENERAL },
            { title: "ตารางที่ 3: ชำระไม่สำเร็จ", id: "failed", chs: CHANNELS_TABLE3 },
            { title: "ตารางที่ 4: รอดำเนินการชำระ (รายการ)", id: "pending", chs: CHANNELS_TABLE4 },
            { title: "ตารางที่ 5: ระหว่างดำเนินการชำระ", id: "processing", chs: CHANNELS_TABLE5 }
        ];
        cfgs.forEach(c => { createTable(c.title, c.id, c.chs, 'dynamic-tables-verify', false); createTable(c.title, c.id, c.chs, 'dynamic-tables-cum', true); });
        
        setTimeout(() => { validateAll(); calculateCumulativeTotals(); }, 100);
        fetchCloudData(); 

        setInterval(() => {
            const timerBadge = document.getElementById('sync-timer-badge');
            if (syncTimeLeft <= 0) {
                if (currentTab === 'cumulative') {
                    timerBadge.innerText = "Syncing";
                    timerBadge.classList.replace('text-blue-600', 'text-red-600');
                    fetchCloudData().then(() => {
                        setTimeout(() => { timerBadge.classList.replace('text-red-600', 'text-blue-600'); }, 1500);
                    });
                }
                syncTimeLeft = 20;
            } else { syncTimeLeft--; }
            if (timerBadge && syncTimeLeft > 0) timerBadge.innerText = syncTimeLeft + "s";
        }, 1000);
    };
</script>
